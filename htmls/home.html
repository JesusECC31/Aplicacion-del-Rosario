<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rosario de Emaús</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">

    <style>
        /* --- PERGAMINO ELEGANTE --- */
        .pergamino {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
            padding: 22px 20px;
            border-radius: 12px;
            margin: 15px 18px;
        }

        .pergamino h3 {
            font-size: 18px;
            margin-bottom: 10px;
            text-align: center;
            color: #f5d57f;
            font-weight: bold;
        }

        .pergamino p {
            font-size: 16px;
            line-height: 1.7;
            text-align: center;
            color: #f0e8c8;
            font-weight: 500;
        }

        /* --- BOTÓN CERRAR SESIÓN ULTRA PEQUEÑO Y DISCRETO --- */
        .boton-cerrar {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 6px;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        .boton-cerrar:hover {
            opacity: 1;
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
        }

        .boton-cerrar svg {
            width: 14px;
            height: 14px;
        }

        /* --- BOTONES NUEVOS --- */
        .boton-nuevo {
            width: 85%;
            margin: 0 auto 14px auto;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            font-size: 16px;
            font-weight: 600;
            display: block;
            text-align: center;
            backdrop-filter: blur(5px);
            text-decoration: none;
            box-shadow: 0 3px 10px rgba(0,0,0,0.35);
            transition: transform .15s ease, background .2s ease;
        }

        .boton-nuevo:hover {
            transform: scale(1.03);
            background: rgba(255,255,255,0.20);
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .contenedor-home {
            padding: 10px 0 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- TÍTULO --- */
        header h1 {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
            margin-bottom: 5px;
        }

        header {
            padding: 15px;
            position: relative;
        }

        body {
            position: relative;
        }

        /* --- MODAL --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            max-width: 300px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .modal-content p {
            margin-bottom: 20px;
            font-size: 16px;
            color: #333;
        }

        .modal-buttons {
            display: flex;
            justify-content: space-around;
        }

        .boton-modal {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: rgba(0,0,0,0.8);
            color: white;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .boton-modal:hover {
            background: rgba(0,0,0,0.9);
        }
    </style>
</head>

<body data-fondo="{{ url_for('static', filename=fondo) }}">

<header style="text-align:center; position:relative;">
    <h1>Rosario de Emaús</h1>

    <button class="boton-cerrar" onclick="openLogoutModal()">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M16 17L21 12L16 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M21 12H9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 21H5C4.5 21 4 20.8 3.6 20.4C3.2 20 3 19.5 3 19V5C3 4.5 3.2 4 3.6 3.6C4 3.2 4.5 3 5 3H9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
</header>

<div class="pergamino">
    <h3>✝ Reflexión del Día</h3>
    <p>{{ reflexion_del_dia }}</p>
</div>

<div class="contenedor-home">
    <a href="/rosario_completo" class="boton-nuevo">Iniciar Rosario</a>
    <a href="/oraciones_del_rosario" class="boton-nuevo">Oraciones del Rosario</a>
</div>

<!-- FIRMA ELIMINADA -->

<div id="logoutModal" class="modal">
    <div class="modal-content">
        <p>¿Estás seguro de que quieres cerrar sesión?</p>
        <div class="modal-buttons">
            <button class="boton-modal" onclick="closeLogoutModal()">No</button>
            <a href="/logout" class="boton-modal">Sí</a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var fondo = document.body && document.body.dataset.fondo;
        if (fondo) {
            document.body.style.backgroundImage = "url('" + fondo + "')";
        }

        var modal = document.getElementById('logoutModal');
        if (modal) {
            window.addEventListener('click', function (event) {
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }
    });

    function openLogoutModal() {
        var modal = document.getElementById('logoutModal');
        if (modal) modal.style.display = 'flex';
    }

    function closeLogoutModal() {
        var modal = document.getElementById('logoutModal');
        if (modal) modal.style.display = 'none';
    }
</script>

</body>
</html>
